# AceMarket Render Blueprint — deploy backend (Convex handles storage)
# Dashboard → New → Blueprint → connect this repo
# Set CORS_ORIGINS, FIREBASE_CREDENTIALS_JSON, CONVEX_URL, CONVEX_DEPLOY_KEY in env vars

services:
  - type: web
    name: acemarket-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    envVars:
      - key: CONVEX_URL
        sync: false
      - key: CONVEX_DEPLOY_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
