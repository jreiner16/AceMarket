# AceMarket Render Blueprint — deploy backend (Supabase handles storage)
# Dashboard → New → Blueprint → connect this repo
# Set DATABASE_URL, CORS_ORIGINS, FIREBASE_CREDENTIALS_JSON in env vars

services:
  - type: web
    name: acemarket-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
