# AceMarket Render Blueprint — deploy backend + PostgreSQL
# Dashboard → New → Blueprint → connect this repo
# Set CORS_ORIGINS, FIREBASE_CREDENTIALS_JSON, ENVIRONMENT in the web service env vars

databases:
  - name: acemarket-db
    plan: free
    region: oregon

services:
  - type: web
    name: acemarket-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: acemarket-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
